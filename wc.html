<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI PREDICTIONS — World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://flagcdn.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* surfaces */
  --bg:#eef0f6;
  --bg2:#ffffff;
  --bg3:#f6f8fc;
  --bg4:#e8ebf2;
  /* WC 26 official */
  --green:#3CAC3B;
  --green-2:#5cc05b;
  --green-3:#1f7a1e;
  --green-bg:rgba(60,172,59,.14);
  --green-bd:rgba(60,172,59,.45);
  --red:#E61D25;
  --red-2:#f04a51;
  --red-3:#a8121a;
  --red-bg:rgba(230,29,37,.12);
  --red-bd:rgba(230,29,37,.45);
  --blue:#2A398D;
  --blue-2:#4960c9;
  --blue-3:#1a2360;
  --blue-bg:rgba(42,57,141,.12);
  --blue-bd:rgba(42,57,141,.45);
  /* premium gold (sparingly) */
  --gold:#D4AF37;
  --gold-2:#e6c558;
  --gold-3:#9a7c1f;
  --gold-bg:rgba(212,175,55,.16);
  --gold-bd:rgba(212,175,55,.55);
  /* text */
  --tx:#1a1f2e;
  --tx-h:#0a0e1a;
  --t2:#525b6b;
  --t3:#8b94a5;
  --t4:#cbd0d8;
  /* borders */
  --bd:#d8dde6;
  --bd2:#bcc3d0;
  /* shadows — bumped for legibility */
  --shadow-sm:0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.06);
  --shadow:0 6px 16px rgba(15,23,42,.10), 0 3px 6px rgba(15,23,42,.06);
  --shadow-lg:0 16px 40px rgba(15,23,42,.14), 0 6px 14px rgba(15,23,42,.08);
  --shadow-blue:0 8px 22px rgba(42,57,141,.30);
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--blue);color:#fff}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 500px at 95% -8%,rgba(42,57,141,.05),transparent 60%),
    radial-gradient(700px 400px at -8% 0%,rgba(60,172,59,.05),transparent 60%);
}
.wrap{max-width:1240px;margin:0 auto;padding:28px 24px 90px}

/* Top stripe */
.banner-stripe{
  height:5px;
  background:linear-gradient(90deg,var(--red) 0%,var(--green) 50%,var(--blue) 100%);
}

/* ===== HEADER ===== */
.hdr{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:30px;padding-bottom:24px;border-bottom:2px solid var(--bd);overflow:hidden}
.hdr-l{position:relative;z-index:2}
.hdr-l h1{
  font-size:46px;
  font-weight:900;
  letter-spacing:-1.6px;
  line-height:1;
  color:var(--blue-3);
}
.hdr-l h1 .ai{color:var(--blue)}
.hdr-l h1 .pred{color:var(--blue-3)}
.hdr-l .sub{font-size:14px;color:var(--t2);font-weight:400;margin-top:10px;letter-spacing:.3px}
.hdr-l .sub b{color:var(--blue-3);font-weight:700}
.hdr-l .demo{display:inline-block;margin-left:8px;padding:2px 9px;border-radius:5px;background:var(--gold-bg);border:1px solid var(--gold-bd);color:var(--gold-3);font-size:10px;font-weight:800;letter-spacing:1px}
.hdr-26{
  position:absolute;
  right:-6px;
  top:50%;
  transform:translateY(-58%);
  font-size:180px;
  font-weight:900;
  line-height:1;
  letter-spacing:-10px;
  color:transparent;
  -webkit-text-stroke:2.5px var(--gold);
  opacity:.35;
  pointer-events:none;
  z-index:1;
  user-select:none;
}
.hdr-chip{
  position:relative;z-index:2;display:inline-flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:9px;
  background:linear-gradient(135deg,var(--red) 0%,var(--green) 50%,var(--blue) 100%);
  color:#fff;
  box-shadow:var(--shadow-blue);
}
.hdr-chip span{font-size:12px;font-weight:800;letter-spacing:2px}

/* ===== STATS — bigger, bolder ===== */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px}
.sc{
  position:relative;background:var(--bg2);
  border:1px solid var(--bd);border-radius:14px;padding:20px 18px;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.sc:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--blue)}
.sc.green::before{background:var(--green)}
.sc.red::before{background:var(--red)}
.sc.blue::before{background:var(--blue)}
.sc.tri::before{background:linear-gradient(90deg,var(--red),var(--green),var(--blue))}
.sc .l{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:1.8px;font-weight:700;margin-bottom:10px}
.sc .v{font-size:32px;font-weight:900;letter-spacing:-1.2px;line-height:1;color:var(--tx-h);font-variant-numeric:tabular-nums}
.sc .s{font-size:12px;color:var(--t2);margin-top:9px;font-weight:500}

/* ===== PANELS ===== */
.panel{
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:16px;padding:22px;margin-bottom:18px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;transition:box-shadow .18s,border-color .18s;
}
.panel:hover{border-color:var(--bd2);box-shadow:var(--shadow)}
.pt{font-size:14px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:var(--blue-3);letter-spacing:.2px}
.pt .ico{font-size:16px;opacity:.85}
.pt .r{margin-left:auto;font-size:12px;color:var(--blue-3);font-weight:700;font-variant-numeric:tabular-nums}

/* ===== CHART ===== */
.chart{position:relative;width:100%;height:230px}
.chart svg{width:100%;height:100%;display:block}
.tip{
  position:absolute;pointer-events:none;
  background:var(--bg2);border:1px solid var(--bd2);border-radius:9px;
  padding:9px 13px;font-size:11px;color:var(--tx);
  opacity:0;transition:opacity .12s;z-index:10;white-space:nowrap;
  box-shadow:var(--shadow-lg);
}
.tip .v{font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
.tip .l{color:var(--t2);font-size:10px;margin-top:3px;font-weight:500}

/* ===== FILTER BAR (orden: Periodo → Mercado → Fase) ===== */
.fbar{
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:16px;padding:20px;margin-bottom:22px;
  box-shadow:var(--shadow-sm);
}
.fgroup{margin-bottom:16px}
.fgroup:last-child{margin-bottom:0}
.fgroup-l{
  font-size:10px;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:2px;
  font-weight:800;
  margin-bottom:10px;
}
.fpills{display:flex;gap:8px;flex-wrap:wrap}
.fpills.sub{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd)}
.pill{
  background:var(--bg3);
  border:1.5px solid var(--bd);
  color:var(--t2);
  padding:10px 18px;
  border-radius:22px;
  font-family:'Noto Sans',sans-serif;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all .15s;
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:42px;
}
.pill:hover{border-color:var(--blue);color:var(--blue-3);background:var(--bg2)}
.pill.on{
  background:var(--blue);
  border-color:var(--blue);
  color:#fff;
  box-shadow:var(--shadow-blue);
}
.pill.on .c{color:rgba(255,255,255,.8)}
.pill .c{
  font-size:11px;
  opacity:.65;
  font-variant-numeric:tabular-nums;
  color:var(--t3);
  font-weight:700;
}
.pill.tab{
  padding:11px 22px;
  font-size:13px;
  letter-spacing:.5px;
  font-weight:800;
}
.pill.tab.on{background:var(--blue-3);border-color:var(--blue-3)}
.pill.market.on{background:var(--green);border-color:var(--green);box-shadow:0 6px 16px rgba(60,172,59,.30)}
.pill.phase.on{background:var(--red);border-color:var(--red);box-shadow:0 6px 16px rgba(230,29,37,.30)}

/* ===== DAY GROUPS ===== */
.day-group{margin-bottom:26px;animation:fadeUp .35s ease both}
.day-hdr{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  background:var(--bg2);
  border:1px solid var(--bd);
  border-left:5px solid var(--blue);
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
}
.day-hdr .day-n{
  font-size:20px;
  font-weight:900;
  color:var(--blue-3);
  letter-spacing:-.3px;
  line-height:1;
}
.day-hdr .day-d{
  font-size:13px;
  color:var(--t2);
  font-weight:600;
}
.day-hdr .day-stats{
  margin-left:auto;
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  font-weight:800;
  font-variant-numeric:tabular-nums;
  flex-wrap:wrap;
}
.day-hdr .day-chip{
  display:inline-flex;
  align-items:center;
  padding:4px 10px;
  border-radius:6px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.5px;
}
.day-hdr .day-chip.green{background:var(--green-bg);color:var(--green-3);border:1px solid var(--green-bd)}
.day-hdr .day-chip.red{background:var(--red-bg);color:var(--red-3);border:1px solid var(--red-bd)}
.day-hdr .day-chip.blue{background:var(--blue-bg);color:var(--blue-3);border:1px solid var(--blue-bd)}

/* ===== BETS ===== */
.bet{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-left-width:5px;
  border-radius:11px;
  padding:14px 18px;
  margin-bottom:10px;
  cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:background .14s,box-shadow .14s,transform .14s;
}
.bet:hover{box-shadow:var(--shadow);background:var(--bg2);transform:translateX(2px)}
.bet.won{border-left-color:var(--green)}
.bet.lost{border-left-color:var(--red)}
.bet.pending{border-left-color:var(--blue)}
.bet.void{border-left-color:var(--t4)}
.bet-main{display:flex;align-items:center;gap:14px}
.bet-info{flex:1;min-width:0}
.bet-top{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--tx-h)}
.bet-top .vs{color:var(--t3);font-weight:500;margin:0 3px}
.bet-top .sub{color:var(--t2);font-weight:500;font-size:13px}
.bet-top .flag{
  display:inline-block;
  width:22px;
  height:16px;
  vertical-align:middle;
  border-radius:2px;
  box-shadow:0 0 0 1px rgba(0,0,0,.08);
  margin-right:4px;
  object-fit:cover;
}
.market-tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:10.5px;
  font-weight:800;
  padding:5px 10px;
  border-radius:6px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.market-tag .ico{font-size:13px;line-height:1}
.market-tag.h2h{background:var(--blue-bg);border:1.5px solid var(--blue-bd);color:var(--blue-3)}
.market-tag.ou{background:var(--green-bg);border:1.5px solid var(--green-bd);color:var(--green-3)}
.market-tag.alt{background:var(--gold-bg);border:1.5px solid var(--gold-bd);color:var(--gold-3)}
.market-tag.btts{background:var(--red-bg);border:1.5px solid var(--red-bd);color:var(--red-3)}
.market-tag.other{background:var(--bg4);border:1.5px solid var(--bd2);color:var(--t2)}
.bet-meta{
  font-size:12.5px;
  color:var(--t2);
  margin-top:7px;
  font-variant-numeric:tabular-nums;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.bet-meta .odds{
  font-weight:700;
  color:var(--tx-h);
}
.bet-meta .edge-pill{
  display:inline-flex;
  align-items:center;
  padding:3px 10px;
  border-radius:5px;
  font-weight:800;
  font-size:12px;
  letter-spacing:.3px;
}
.bet-meta .edge-pill.eh{background:var(--green-bg);color:var(--green-3);border:1px solid var(--green-bd)}
.bet-meta .edge-pill.em{background:var(--gold-bg);color:var(--gold-3);border:1px solid var(--gold-bd)}
.bet-meta .edge-pill.el{background:var(--bg4);color:var(--t2);border:1px solid var(--bd)}
.bet-meta .sep{color:var(--t4)}
.bet-meta .actual{color:var(--blue-3);font-weight:700}
.badge{
  padding:7px 14px;
  border-radius:8px;
  font-size:12px;
  font-weight:900;
  letter-spacing:1px;
  flex-shrink:0;
  min-width:74px;
  text-align:center;
}
.badge.won{background:var(--green);color:#fff;box-shadow:0 4px 10px rgba(60,172,59,.30)}
.badge.lost{background:var(--red);color:#fff;box-shadow:0 4px 10px rgba(230,29,37,.30)}
.badge.pending{background:var(--blue);color:#fff;box-shadow:0 4px 10px rgba(42,57,141,.30)}
.badge.void{background:var(--t4);color:#fff}
.chev{color:var(--t3);font-size:13px;transition:transform .2s;flex-shrink:0;font-weight:700}
.bet.exp .chev{transform:rotate(90deg);color:var(--blue)}
.detail{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s ease,opacity .25s ease}
.bet.exp .detail{max-height:420px;opacity:1;margin-top:14px;transition:max-height .3s ease,opacity .25s ease .05s}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding-top:14px;border-top:1.5px dashed var(--bd2)}
.dcell{background:var(--bg3);border-radius:9px;padding:11px 12px;border:1px solid var(--bd)}
.dcell .dl{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:800;margin-bottom:5px}
.dcell .dv{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--tx-h)}

/* ===== EMPTY STATES ===== */
.empty{text-align:center;padding:80px 24px 70px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.empty.filter-empty{padding:50px 24px}
.empty::before{content:'';position:absolute;top:-30%;right:-15%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,var(--gold-bg),transparent 65%);pointer-events:none}
.empty .em-trophy{font-size:64px;margin-bottom:14px;position:relative}
.empty .em-title{font-size:24px;font-weight:900;color:var(--blue-3);letter-spacing:-.5px;margin-bottom:10px;position:relative}
.empty .em-sub{font-size:14px;color:var(--t2);font-weight:500;max-width:460px;margin:0 auto;line-height:1.55;position:relative}
.empty .em-date{margin-top:22px;display:inline-block;padding:12px 22px;border:1.5px solid var(--gold-bd);border-radius:10px;font-weight:800;letter-spacing:1.5px;color:var(--gold-3);font-size:12px;position:relative;background:var(--gold-bg)}

/* ===== FOOTER ===== */
.footer{text-align:center;padding:38px 20px 12px;color:var(--t3);font-size:11px;letter-spacing:1.2px;font-weight:600}
.footer b{color:var(--blue-3);font-weight:800}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:1000px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .hdr-26{font-size:130px}
  .hdr-l h1{font-size:36px}
  .sc .v{font-size:28px}
}
@media(max-width:680px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .wrap{padding:18px 14px 80px}
  .hdr{flex-direction:column;align-items:flex-start;gap:14px;padding-bottom:20px}
  .hdr-26{font-size:90px;right:-8px}
  .hdr-l h1{font-size:32px}
  .dgrid{grid-template-columns:repeat(2,1fr)}
  .day-hdr{padding:12px 14px}
  .day-hdr .day-n{font-size:17px}
  .day-hdr .day-d{font-size:12px;width:100%;margin-top:2px}
  .day-hdr .day-stats{font-size:11px;width:100%;margin-left:0;margin-top:4px}
  .bet{padding:13px 14px}
  .bet-top{font-size:14px}
  .badge{padding:6px 11px;font-size:11px;min-width:64px}
  .pill{padding:11px 16px;font-size:13px;min-height:44px}
  .pill.tab{padding:12px 18px}
  .market-tag{font-size:10px;padding:4px 8px}
  .sc{padding:16px 14px}
  .sc .v{font-size:24px}
  .sc .l{font-size:10px;letter-spacing:1.4px}
  .bet-meta{font-size:12px}
  .fbar{padding:16px}
}
@media(max-width:420px){
  .stats{grid-template-columns:1fr 1fr}
  .hdr-l h1{font-size:28px}
}
</style>
</head>
<body>
<div class="banner-stripe"></div>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-l">
      <h1><span class="ai">AI</span> <span class="pred">PREDICTIONS</span></h1>
      <div class="sub">by <b>Andross</b> &nbsp;·&nbsp; <span id="meta">Loading…</span></div>
    </div>
    <div class="hdr-chip"><span>WORLD CUP 26</span></div>
    <div class="hdr-26">26</div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div class="stats" id="stats"></div>

    <div class="panel">
      <div class="pt"><span class="ico">📈</span>P/L Acumulado por día <span class="r" id="plR"></span></div>
      <div class="chart" id="plC"><div class="tip" id="plT"></div></div>
    </div>

    <!-- FILTER BAR: orden Periodo → Mercado → Fase -->
    <div class="fbar">
      <div class="fgroup">
        <div class="fgroup-l">⏱ Periodo</div>
        <div class="fpills" id="periodTabs"></div>
        <div class="fpills sub" id="periodSubs" style="display:none"></div>
      </div>
      <div class="fgroup">
        <div class="fgroup-l">🎲 Mercado</div>
        <div class="fpills" id="marketTog"></div>
      </div>
      <div class="fgroup">
        <div class="fgroup-l">🏟 Fase del torneo</div>
        <div class="fpills" id="phaseTog"></div>
      </div>
    </div>

    <div id="bets"></div>
  </div>

  <!-- EMPTY STATE (cuando wc_data.json está vacío o el fetch falla) -->
  <div id="empty" class="empty" style="display:none">
    <div class="em-trophy">🏆</div>
    <div class="em-title">Aún no hay picks publicadas</div>
    <div class="em-sub">El bot empieza a generar predicciones cuando el Mundial arranque.</div>
    <div class="em-date">FIFA WORLD CUP 26 · KICK-OFF 11 JUN</div>
  </div>

  <div class="footer">AI PREDICTIONS by <b>Andross</b> — WORLD CUP 26 🏆</div>
</div>

<script>
const STAKE = 5;
let BETS = [];
let IS_DEMO = false;
const F = {
  periodMode:'total',  // 'total' | 'day' | 'week'
  periodDay:null,      // number when periodMode='day'
  periodWeek:null,     // number when periodMode='week'
  markets:new Set(),
  phase:'all',
};
const EXPANDED = new Set();

const WC_START = new Date('2026-06-11T00:00:00');
const PHASE_RANGES = [
  ['Groups','2026-06-11','2026-06-27'],
  ['R16',   '2026-06-28','2026-07-03'],
  ['QF',    '2026-07-04','2026-07-07'],
  ['SF',    '2026-07-09','2026-07-10'],
  ['3rd',   '2026-07-11','2026-07-11'],
  ['Final', '2026-07-12','2026-07-12'],
];

/* ===== FLAGS — ISO 2-letter codes for flagcdn.com ===== */
const FLAG_CODES = {
  // 48 WC 2026 teams + Spanish aliases
  'spain':'es','españa':'es',
  'argentina':'ar',
  'france':'fr','francia':'fr',
  'england':'gb-eng','inglaterra':'gb-eng',
  'brazil':'br','brasil':'br',
  'portugal':'pt',
  'colombia':'co',
  'netherlands':'nl','países bajos':'nl','paises bajos':'nl','holland':'nl',
  'ecuador':'ec',
  'croatia':'hr','croacia':'hr',
  'germany':'de','alemania':'de',
  'norway':'no','noruega':'no',
  'japan':'jp','japón':'jp','japon':'jp',

function flagImg(name){
  if(!name) return '';
  const code = FLAG_CODES[name.trim().toLowerCase()];
  if(!code) return '';
  return `<img class="flag" src="https://flagcdn.com/24x18/${code}.png" srcset="https://flagcdn.com/48x36/${code}.png 2x" width="22" height="16" alt="${name}" loading="lazy">`;
}

function formatTeamMatch(playerName){
  if(!playerName) return '';
  if(!playerName.includes('@')) return playerName;
  const parts = playerName.split('@').map(s=>s.trim());
  const a = parts[0], b = parts[1];
  return `${flagImg(a)}<span>${a}</span><span class="vs">@</span>${flagImg(b)}<span>${b}</span>`;
}

/* ===== MARKET ICONS ===== */
const MARKET_ICON = {
  'H2H':'🏆',
  'O/U Main':'⚽',
  'Alt Totals':'📊',
  'BTTS':'🎯',
  'Other':'•',
};

/* ===== helpers ===== */
function calcPL(b){
  const o=parseInt(b.odds_american);
  if(b.status==='won') return o>0?STAKE*(o/100):STAKE*(100/Math.abs(o));
  if(b.status==='lost') return -STAKE;
  return 0;
}
function parseISO(s){if(!s)return null;try{const d=new Date(s);return isNaN(d)?null:d;}catch{return null;}}
function commenceDate(b){
  const ct = b.commence_time||'';
  // Bot format first ("Jun 11, 08:00 PM" — no year). new Date() of this
  // string parses to year 1900 silently, so we must check the regex BEFORE
  // falling back to ISO parsing.
  const m = ct.match(/^(\w+)\s+(\d+),\s+(\d+):(\d+)\s+(AM|PM)$/);
  if(m){
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    let h=parseInt(m[3]); if(m[5]==='PM'&&h<12)h+=12; if(m[5]==='AM'&&h===12)h=0;
    return new Date(2026, months[m[1]]||0, parseInt(m[2]), h, parseInt(m[4]));
  }
  const iso = parseISO(ct);
  if(iso) return iso;
  return parseISO(b.recorded_at);
}
function dayNum(b){
  const d = commenceDate(b);
  if(!d) return null;
  const start = new Date(WC_START.getFullYear(), WC_START.getMonth(), WC_START.getDate());
  const cur   = new Date(d.getFullYear(),       d.getMonth(),       d.getDate());
  const diff  = Math.round((cur - start) / 86400000);
  return diff + 1;
}
function weekNum(b){
  const dn = dayNum(b);
  if(dn == null) return null;
  return Math.ceil(dn/7);
}
function phaseOf(b){
  const d = commenceDate(b);
  if(!d) return '?';
  const iso = d.toISOString().slice(0,10);
  for(const [name,from,to] of PHASE_RANGES){
    if(iso >= from && iso <= to) return name;
  }
  return 'Pre/Post';
}
function marketOf(b){
  const p = b.prop_type||'';
  if(p.startsWith('Win ')||p==='Draw') return 'H2H';
  if(p.startsWith('BTTS')) return 'BTTS';
  if(p.startsWith('Goals ')){
    return b.line===2.5 ? 'O/U Main' : 'Alt Totals';
  }
  return 'Other';
}
function marketClass(m){
  return {'H2H':'h2h','O/U Main':'ou','Alt Totals':'alt','BTTS':'btts'}[m] || 'other';
}
function dateLabel(d){
  if(!d) return '—';
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dow = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `${dow[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function mkSVG(el,w,h){
  const s=ns('svg'); s.setAttribute('viewBox','0 0 '+w+' '+h);
  el.querySelectorAll('svg').forEach(x=>x.remove());
  el.insertBefore(s, el.querySelector('.tip'));
  return s;
}
function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}

/* ===== FILTER ===== */
function matchPeriod(b){
  if(F.periodMode === 'day' && F.periodDay != null){
    if(dayNum(b) !== F.periodDay) return false;
  }
  if(F.periodMode === 'week' && F.periodWeek != null){
    if(weekNum(b) !== F.periodWeek) return false;
  }
  return true;
}
function matchFilter(b){
  if(F.phase !== 'all' && phaseOf(b) !== F.phase) return false;
  if(F.markets.size && !F.markets.has(marketOf(b))) return false;
  if(!matchPeriod(b)) return false;
  return true;
}
function fmtPct(x){return x==null?'—':(x*100).toFixed(1)+'%';}

/* ===== STATS ===== */
function renderStats(){
  const fb = BETS.filter(matchFilter);
  const res = fb.filter(b=>b.status==='won'||b.status==='lost');
  const w = res.filter(b=>b.status==='won').length;
  const l = res.length - w;
  const pend = fb.filter(b=>b.status==='pending').length;
  const wr = res.length ? w/res.length*100 : 0;
  const pl = res.reduce((s,b)=>s+calcPL(b), 0);
  const roi = res.length ? pl/(res.length*STAKE)*100 : 0;
  const sorted = [...res].sort((a,b)=>{
    const da=parseISO(a.graded_at||a.recorded_at), db=parseISO(b.graded_at||b.recorded_at);
    return (!da||!db)?0:da-db;
  });
  let stk=0, st='';
  for(let i=sorted.length-1;i>=0;i--){
    if(st==='' || sorted[i].status===st){st=sorted[i].status;stk++;}else break;
  }
  const stkTxt = st==='won' ? `${stk}W 🔥` : st==='lost' ? `${stk}L` : '—';
  const stkCol = st==='won' ? 'var(--green-3)' : st==='lost' ? 'var(--red-3)' : 'var(--blue-3)';
  const wCol = wr>=55?'var(--green-3)' : wr>=50?'var(--gold-3)' : 'var(--red-3)';
  const pCol = pl>=0?'var(--green-3)':'var(--red-3)';
  const html =
    card('tri', 'Record',   `${w}W-${l}L`,                       `${pend} pending`) +
    card(wr>=55?'green':wr>=50?'':'red', 'Win Rate', `<span style="color:${wCol}">${wr.toFixed(1)}%</span>`, `${res.length} resolved`) +
    card(pl>=0?'green':'red', 'P / L',  `<span style="color:${pCol}">${pl>=0?'+':''}$${pl.toFixed(2)}</span>`, `$${STAKE} flat`) +
    card(pl>=0?'green':'red', 'ROI',    `<span style="color:${pCol}">${roi>=0?'+':''}${roi.toFixed(1)}%</span>`, `on ${(res.length*STAKE).toFixed(0)}u`) +
    card('blue', 'Streak',   `<span style="color:${stkCol}">${stkTxt}</span>`, 'current');
  document.getElementById('stats').innerHTML = html;
}
function card(cls,l,v,s){return `<div class="sc ${cls}"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`;}

/* ===== CHART ===== */
function drawPL(){
  const el = document.getElementById('plC'), tip = document.getElementById('plT');
  el.querySelectorAll('svg').forEach(x=>x.remove());
  const fb = BETS.filter(matchFilter);
  const res = fb.filter(b=>b.status==='won'||b.status==='lost');
  if(!res.length){
    document.getElementById('plR').textContent = '—';
    el.insertAdjacentHTML('afterbegin','<div style="color:var(--t2);font-size:13px;padding:80px;text-align:center">Sin datos resueltos.</div>');
    return;
  }
  const byDay = {};
  res.forEach(b=>{
    const d = dayNum(b);
    if(d == null) return;
    if(!byDay[d]) byDay[d] = {day:d, pl:0, w:0, l:0};
    byDay[d].pl += calcPL(b);
    if(b.status==='won') byDay[d].w++; else byDay[d].l++;
  });
  const days = Object.values(byDay).sort((a,b)=>a.day-b.day);
  if(!days.length){document.getElementById('plR').textContent='—'; return;}
  let cum=0;
  const pts = days.map(d=>{cum+=d.pl; return {x:d.day, y:cum, d:d};});
  document.getElementById('plR').textContent = `Día ${pts[pts.length-1].x} · ${cum>=0?'+':''}$${cum.toFixed(2)}`;

  const W=620,H=220,P={t:24,r:28,b:34,l:54};
  const svg = mkSVG(el, W, H);
  const minY = Math.min(0, ...pts.map(p=>p.y)) - 3;
  const maxY = Math.max(0, ...pts.map(p=>p.y)) + 3;
  const rY = maxY - minY || 1;
  const minX = pts[0].x, maxX = pts[pts.length-1].x;
  const sx = x => ((x-minX)/(maxX-minX||1))*(W-P.l-P.r) + P.l;
  const sy = v => H - P.b - ((v-minY)/rY)*(H-P.t-P.b);

  for(let i=0;i<=5;i++){
    const v = minY + rY/5*i, y = sy(v);
    const gl = ns('line'); gl.setAttribute('x1',P.l);gl.setAttribute('x2',W-P.r);gl.setAttribute('y1',y);gl.setAttribute('y2',y);
    gl.setAttribute('stroke','var(--bd)');gl.setAttribute('stroke-width','1');
    svg.appendChild(gl);
    const t = ns('text'); t.setAttribute('x',P.l-8);t.setAttribute('y',y+3);t.setAttribute('text-anchor','end');
    t.setAttribute('fill','var(--t3)');t.setAttribute('font-size','10');t.setAttribute('font-family','Noto Sans');
    t.textContent=`$${v.toFixed(0)}`;
    svg.appendChild(t);
  }
  if(minY<0 && maxY>0){
    const z=ns('line');z.setAttribute('x1',P.l);z.setAttribute('x2',W-P.r);z.setAttribute('y1',sy(0));z.setAttribute('y2',sy(0));
    z.setAttribute('stroke','var(--bd2)');z.setAttribute('stroke-dasharray','4,3');svg.appendChild(z);
  }
  const lineCol = cssv('--blue');
  const defs=ns('defs'),g=ns('linearGradient');g.id='wcPL';
  g.setAttribute('x1','0');g.setAttribute('y1','0');g.setAttribute('x2','0');g.setAttribute('y2','1');
  const s1=ns('stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',lineCol);s1.setAttribute('stop-opacity','.26');g.appendChild(s1);
  const s2=ns('stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',lineCol);s2.setAttribute('stop-opacity','0');g.appendChild(s2);
  defs.appendChild(g);svg.appendChild(defs);
  let a = 'M'+sx(pts[0].x)+','+sy(0);
  pts.forEach(p => a += ' L'+sx(p.x)+','+sy(p.y));
  a += ' L'+sx(pts[pts.length-1].x)+','+sy(0)+' Z';
  const ar=ns('path');ar.setAttribute('d',a);ar.setAttribute('fill','url(#wcPL)');svg.appendChild(ar);
  let dPath=''; pts.forEach((p,i)=>dPath+=(i?'L':'M')+sx(p.x)+','+sy(p.y));
  const ln=ns('path');ln.setAttribute('d',dPath);ln.setAttribute('fill','none');ln.setAttribute('stroke',lineCol);
  ln.setAttribute('stroke-width','3');ln.setAttribute('stroke-linecap','round');ln.setAttribute('stroke-linejoin','round');svg.appendChild(ln);
  pts.forEach(p=>{
    const dot=ns('circle');dot.setAttribute('cx',sx(p.x));dot.setAttribute('cy',sy(p.y));dot.setAttribute('r','5');
    dot.setAttribute('fill',lineCol);dot.setAttribute('stroke',cssv('--bg2'));dot.setAttribute('stroke-width','2.5');
    svg.appendChild(dot);
  });
  const last = pts[pts.length-1];
  const ltx=ns('text');ltx.setAttribute('x',sx(last.x));ltx.setAttribute('y',sy(last.y)-14);ltx.setAttribute('text-anchor','middle');
  ltx.setAttribute('fill', cum>=0 ? cssv('--green-3') : cssv('--red-3'));
  ltx.setAttribute('font-size','13');ltx.setAttribute('font-weight','900');
  ltx.setAttribute('font-family','Noto Sans');
  ltx.textContent=`${cum>=0?'+':''}$${cum.toFixed(2)}`;svg.appendChild(ltx);
  const step = Math.max(1, Math.ceil(pts.length/8));
  pts.forEach((p,i)=>{
    if(i%step!==0 && i!==pts.length-1) return;
    const t=ns('text');t.setAttribute('x',sx(p.x));t.setAttribute('y',H-10);t.setAttribute('text-anchor','middle');
    t.setAttribute('fill','var(--t3)');t.setAttribute('font-size','10');t.setAttribute('font-family','Noto Sans');t.setAttribute('font-weight','600');
    t.textContent=`D${p.x}`;svg.appendChild(t);
  });
  const hw = (W-P.l-P.r)/(pts.length||1);
  const hl=ns('line');hl.setAttribute('y1',P.t);hl.setAttribute('y2',H-P.b);hl.setAttribute('stroke',cssv('--blue'));hl.setAttribute('stroke-dasharray','3,3');hl.style.opacity='0';svg.appendChild(hl);
  const hd=ns('circle');hd.setAttribute('r','6');hd.setAttribute('fill',cssv('--blue'));hd.style.opacity='0';svg.appendChild(hd);
  pts.forEach((p,i)=>{
    const r=ns('rect');r.setAttribute('x',sx(p.x)-hw/2);r.setAttribute('y',P.t);r.setAttribute('width',hw);r.setAttribute('height',H-P.t-P.b);r.setAttribute('fill','transparent');r.style.cursor='crosshair';
    r.addEventListener('mouseenter',()=>{
      tip.style.opacity='1';
      const c = p.y>=0?cssv('--green-3'):cssv('--red-3');
      tip.innerHTML=`<div class="v" style="color:${c}">${p.y>=0?'+':''}$${p.y.toFixed(2)}</div><div class="l">Día ${p.x} · ${p.d.w}W-${p.d.l}L</div>`;
      hl.setAttribute('x1',sx(p.x));hl.setAttribute('x2',sx(p.x));hl.style.opacity='.5';
      hd.setAttribute('cx',sx(p.x));hd.setAttribute('cy',sy(p.y));hd.style.opacity='1';
    });
    r.addEventListener('mousemove',e=>{const b=el.getBoundingClientRect();tip.style.left=(e.clientX-b.left+12)+'px';tip.style.top=(e.clientY-b.top-10)+'px';});
    r.addEventListener('mouseleave',()=>{tip.style.opacity='0';hl.style.opacity='0';hd.style.opacity='0';});
    svg.appendChild(r);
  });
}

/* ===== FILTERS UI ===== */
function renderFilters(){
  // PERIODO
  const tabs = [
    {key:'total', label:'Total'},
    {key:'day',   label:'Por Día'},
    {key:'week',  label:'Por Semana'},

    `<button class="pill tab ${F.periodMode===t.key?'on':''}" data-pmode="${t.key}">${t.label}</button>`
  ).join('');

  // Sub-pills (Día N or Sem N)
  const sub = document.getElementById('periodSubs');

    sub.style.display = 'flex';

    sub.innerHTML = `<button class="pill ${F.periodDay==null?'on':''}" data-pday="all">Todos los días</button>` +
      days.map(d=>{

    sub.innerHTML = `<button class="pill ${F.periodWeek==null?'on':''}" data-pweek="all">Todas las semanas</button>` +
      weeks.map(w=>{
        const n = BETS.filter(b=>weekNum(b)===w).length;

      }).join('');

    sub.style.display = 'none';

  // MERCADOS (multi)
  const markets = ['H2H','O/U Main','Alt Totals','BTTS'];
  document.getElementById('marketTog').innerHTML = markets.map(m=>{

  // FASE

  document.getElementById('phaseTog').innerHTML =
    `<button class="pill phase ${F.phase==='all'?'on':''}" data-phase="all">Todas</button>` +
    phases.map(p=>{
      const n = BETS.filter(b=>phaseOf(b)===p).length;
      return `<button class="pill phase ${F.phase===p?'on':''}" data-phase="${p}">${p}${n?` <span class="c">${n}</span>`:''}</button>`;
    }).join('');
}

/* ===== BETS LIST ===== */
function renderBets(){
  const fb = BETS.filter(matchFilter);
  const cont = document.getElementById('bets');
  if(!fb.length){
    cont.innerHTML = `<div class="empty filter-empty">
        <div style="font-size:42px;margin-bottom:12px;opacity:.5">🔍</div>
        <div class="em-title" style="font-size:18px">No hay picks para este periodo</div>
        <div class="em-sub" style="margin-top:6px">Probá cambiar los filtros o seleccionar otro día/semana.</div>
      </div>`;
    return;
  }
  const byDay = {};
  fb.forEach(b=>{
    const d = dayNum(b);
    const key = d != null ? d : '_none';
    if(!byDay[key]) byDay[key] = {day:d, date:commenceDate(b), bets:[]};
    byDay[key].bets.push(b);
  });
  const groups = Object.values(byDay).sort((a,b)=>{
    if(a.day==null) return 1;
    if(b.day==null) return -1;
    return b.day - a.day;
  });

  let html = '';
  groups.forEach((g, gi)=>{
    const gw = g.bets.filter(b=>b.status==='won').length;
    const gl = g.bets.filter(b=>b.status==='lost').length;
    const gp = g.bets.filter(b=>b.status==='pending').length;
    const gPL = g.bets.reduce((s,b)=>s+calcPL(b),0);
    const recColCls = gw>gl?'green':gw===gl?'blue':'red';
    let chips = '';
    if(gw+gl){
      chips += `<span class="day-chip ${recColCls}">${gw}W-${gl}L</span>`;
      chips += `<span class="day-chip ${gPL>=0?'green':'red'}">${gPL>=0?'+':''}$${gPL.toFixed(2)}</span>`;
    }
    if(gp){
      chips += `<span class="day-chip blue">${gp} PEND</span>`;
    }
    const dLabel = g.date ? dateLabel(g.date) : '';
    const dayLabel = g.day != null ? `DÍA ${g.day}` : 'SIN FECHA';
    html += `<div class="day-group" style="animation-delay:${Math.min(gi*.04,.4)}s">`
         + `<div class="day-hdr"><div class="day-n">${dayLabel}</div><div class="day-d">${dLabel}</div><div class="day-stats">${chips}</div></div>`;
    // sort by commence time ASC within day (earliest first)
    g.bets.sort((a,b)=>{
      const da = commenceDate(a), db = commenceDate(b);
      if(da && db) return da - db;
      return 0;
    });
    g.bets.forEach(b=>{
      const sc = b.status||'pending';
      const ep = ((b.edge||0)*100).toFixed(1);
      const ec = b.edge>=.15?'eh':b.edge>=.08?'em':'el';
      const mk = marketOf(b);
      const mcls = marketClass(mk);
      const ico = MARKET_ICON[mk] || '';
      const act = (b.actual_stat!==undefined && b.actual_stat!==null) ? ` <span class="sep">·</span> Result <span class="actual">${b.actual_stat}</span>` : '';
      const exp = EXPANDED.has(b._id) ? ' exp' : '';
      const eloLine = (b.elo_home && b.elo_away) ? ` <span class="sep">·</span> Elo ${b.elo_home}-${b.elo_away}` : '';
      html += `<div class="bet ${sc}${exp}" data-bet="${b._id}">`
           + `<div class="bet-main"><div class="bet-info">`
           + `<div class="bet-top"><span class="market-tag ${mcls}"><span class="ico">${ico}</span>${mk}</span>${formatTeamMatch(b.player_name)}<span class="sub">· ${b.prop_type}</span></div>`
           + `<div class="bet-meta"><span class="odds">${b.odds_american}</span> <span class="sep">·</span> <span class="edge-pill ${ec}">Edge ${ep}%</span>${eloLine}${act}</div>`
           + `</div><span class="badge ${sc}">${sc.toUpperCase()}</span><span class="chev">▶</span></div>`
           + detailHTML(b)
           + `</div>`;
    });
    html += `</div>`;
  });
  cont.innerHTML = html;
}

function detailHTML(b){
  const cells = [
    ['Modelo puro', fmtPct(b.prob_model_raw!=null ? b.prob_model_raw : b.real_prob)],
    ['Blend',       fmtPct(b.real_prob)],
    ['Implícita',   fmtPct(b.implied_prob)],
    ['Edge',        ((b.edge||0)*100).toFixed(2)+'pp'],
    ['Engine',      b.engine || b.consistency || '—'],
    ['Kelly bet',   b.kelly_bet!=null?'$'+(+b.kelly_bet).toFixed(2):'—'],
    ['Potential',   b.potential_win!=null?'$'+(+b.potential_win).toFixed(2):'—'],
    ['Mercado',     b.market_key||'—'],
  ];
  return `<div class="detail"><div class="dgrid">`
       + cells.map(([l,v])=>`<div class="dcell"><div class="dl">${l}</div><div class="dv">${v}</div></div>`).join('')
       + `</div></div>`;
}

/* ===== ORCHESTRATION ===== */
function render(){
  const meta = document.getElementById('meta');
  if(!BETS.length){
    document.getElementById('content').style.display='none';
    document.getElementById('empty').style.display='block';
    meta.textContent = 'WORLD CUP 26 · 0 picks';
    return;
  }
  document.getElementById('content').style.display='block';
  document.getElementById('empty').style.display='none';
  const demoTag = IS_DEMO ? ' <span class="demo">DEMO</span>' : '';
  meta.innerHTML = `WORLD CUP 26 · ${BETS.length} ${IS_DEMO?'picks de ejemplo':'picks'} · ${new Date().toLocaleDateString('es-AR')}${demoTag}`;
  renderStats();
  drawPL();
  renderFilters();
  renderBets();
}

document.addEventListener('click', e=>{
  // period mode tabs
  const pm = e.target.closest('[data-pmode]');
  if(pm){
    F.periodMode = pm.dataset.pmode;
    if(F.periodMode !== 'day')  F.periodDay = null;
    if(F.periodMode !== 'week') F.periodWeek = null;
    render(); return;
  }
  const pd = e.target.closest('[data-pday]');
  if(pd){
    F.periodDay = pd.dataset.pday === 'all' ? null : +pd.dataset.pday;
    render(); return;
  }
  const pw = e.target.closest('[data-pweek]');
  if(pw){
    F.periodWeek = pw.dataset.pweek === 'all' ? null : +pw.dataset.pweek;
    render(); return;
  }
  const mk = e.target.closest('[data-market]');
  if(mk){
    const v = mk.dataset.market;
    if(F.markets.has(v)) F.markets.delete(v); else F.markets.add(v);
    render(); return;
  }
  const ph = e.target.closest('[data-phase]');
  if(ph){F.phase = ph.dataset.phase; render(); return;}
  const bet = e.target.closest('[data-bet]');
  if(bet){
    const id = +bet.dataset.bet;
    if(EXPANDED.has(id)) EXPANDED.delete(id); else EXPANDED.add(id);
    bet.classList.toggle('exp');
    return;
  }
});

async function load(){
  try{
    const r = await fetch('wc_data.json?t='+Date.now());
    const data = await r.json();
    BETS = (Array.isArray(data) && data.length) ? data : [];
    IS_DEMO = false;
    BETS.forEach((b,i)=>b._id=i);
    render();
  }catch(e){
    BETS = []; IS_DEMO = false;
    render();
  }
}
load();
</script>
