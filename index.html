<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDROSS PICKS — Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f1a;--bg2:#0a0b14;--card:#181a2e;--card2:#1e2138;--inset:#12142099;
  --bd:#262a44;--bd2:#363b5e;
  --tx:#e8eaf6;--t2:#8b90b0;--t3:#565b7e;
  --pr:#8b5cf6;--pr2:#a78bfa;--pr3:#c4b5fd;--pr-bg:rgba(139,92,246,.09);--pr-bd:rgba(139,92,246,.22);--pr-glow:rgba(139,92,246,.25);
  --gn:#22c55e;--gn2:#4ade80;--gn-bg:rgba(34,197,94,.08);--gn-bd:rgba(34,197,94,.22);
  --rd:#ef4444;--rd2:#f87171;--rd-bg:rgba(239,68,68,.08);--rd-bd:rgba(239,68,68,.22);
  --gl:#f59e0b;--gl2:#fbbf24;--gl-bg:rgba(245,158,11,.08);--gl-bd:rgba(245,158,11,.22);
}
*{margin:0;padding:0;box-sizing:border-box}
::selection{background:var(--pr);color:#fff}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 80% -8%,rgba(139,92,246,.10),transparent 60%),radial-gradient(700px 400px at 0% 0%,rgba(34,197,94,.04),transparent 55%)}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:1280px;margin:0 auto;padding:26px 22px 90px}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;padding-bottom:20px;border-bottom:1px solid var(--bd)}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--pr),#6d28d9);font-size:22px;font-weight:700;color:#fff;letter-spacing:-1px;box-shadow:0 6px 26px var(--pr-glow)}
.hdr h1{font-size:23px;font-weight:700;letter-spacing:-.5px}
.hdr .sub{font-size:11px;color:var(--t2);margin-top:3px;font-family:'JetBrains Mono',monospace}
.chip{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;background:var(--pr-bg);border:1px solid var(--pr-bd)}
.chip .dot{width:7px;height:7px;border-radius:50%;background:var(--pr2);box-shadow:0 0 10px var(--pr2)}
.chip span{font-size:11px;font-weight:700;color:var(--pr2);font-family:'JetBrains Mono',monospace;letter-spacing:1.5px}

/* stat cards */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:22px}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:transform .18s,border-color .18s,box-shadow .18s}
.sc:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:0 10px 34px rgba(0,0,0,.28)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:.9}
.sc.pr::before{background:linear-gradient(90deg,var(--pr),var(--pr2))}.sc.gn::before{background:linear-gradient(90deg,var(--gn),var(--gn2))}.sc.rd::before{background:linear-gradient(90deg,var(--rd),var(--rd2))}.sc.gl::before{background:linear-gradient(90deg,var(--gl),var(--gl2))}
.sc .l{font-size:9.5px;color:var(--t2);text-transform:uppercase;letter-spacing:1.6px;font-family:'JetBrains Mono',monospace;margin-bottom:9px}
.sc .v{font-size:25px;font-weight:700;letter-spacing:-1px;line-height:1}
.sc .s{font-size:10.5px;color:var(--t2);margin-top:7px;font-family:'JetBrains Mono',monospace}

/* panels */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:20px;overflow:hidden;transition:border-color .18s}
.panel:hover{border-color:var(--bd2)}
.pt{font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.pt .ico{font-size:15px;opacity:.9}
.pt .r{margin-left:auto;font-size:11px;color:var(--t2);font-weight:400;font-family:'JetBrains Mono',monospace}
.chart{position:relative;width:100%;height:218px}
.chart svg{width:100%;height:100%;display:block}
.tip{position:absolute;pointer-events:none;background:var(--card2);border:1px solid var(--bd2);border-radius:9px;padding:8px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--tx);opacity:0;transition:opacity .12s;z-index:10;white-space:nowrap;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.tip .v{font-weight:700;font-size:13px}.tip .l{color:var(--t2);font-size:9px;margin-top:2px}

/* market + edge bars */
.row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.row .nm{width:108px;font-size:12px;font-weight:600;flex-shrink:0}
.bw{flex:1;height:28px;background:var(--inset);border-radius:8px;overflow:hidden;position:relative}
.bar{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:11px;transition:width .9s cubic-bezier(.22,1,.36,1)}
.bar span{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.bst{width:128px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t2);text-align:right;flex-shrink:0}

/* streak */
.sdots{display:flex;gap:4px;flex-wrap:wrap}
.sd{width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'JetBrains Mono',monospace;transition:transform .12s;cursor:default}
.sd:hover{transform:scale(1.35);z-index:2}
.sd.w{background:var(--gn-bg);color:var(--gn);border:1px solid var(--gn-bd)}
.sd.l{background:var(--rd-bg);color:var(--rd);border:1px solid var(--rd-bd)}

/* controls */
.controls{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:16px 18px;margin-bottom:18px}
.ctl-top{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;background:var(--inset);border:1px solid var(--bd);border-radius:10px;padding:10px 14px 10px 36px;color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:13px;transition:border-color .15s}
.search input:focus{outline:none;border-color:var(--pr)}
.search input::placeholder{color:var(--t3)}
.search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px}
.seg{display:flex;gap:3px;background:var(--inset);border-radius:10px;padding:3px}
.seg b{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--t2);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.seg b:hover{color:var(--tx)}
.seg b.on{background:var(--pr);color:#fff;box-shadow:0 2px 12px var(--pr-glow)}
.ctl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.ctl-lab{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1.4px;font-family:'JetBrains Mono',monospace;width:54px;flex-shrink:0}
.tog{background:var(--inset);border:1px solid var(--bd);color:var(--t2);padding:6px 14px;border-radius:20px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.tog:hover{border-color:var(--pr);color:var(--tx)}
.tog.on{background:var(--pr-bg);border-color:var(--pr);color:var(--pr2)}
.tog .c{font-family:'JetBrains Mono',monospace;font-size:10px;opacity:.7}

/* bets */
.group{margin-bottom:14px;animation:fadeUp .4s ease both}
.gh{background:var(--card2);padding:11px 16px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bd);border-bottom:none}
.gh .t{font-size:13px;font-weight:600}.gh .d{font-size:10.5px;color:var(--t2);margin-top:2px;font-family:'JetBrains Mono',monospace}
.gh .rec{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700}
.bet{background:var(--card);border:1px solid var(--bd);border-top:none;padding:12px 16px;cursor:pointer;transition:background .14s}
.bet:last-child{border-radius:0 0 12px 12px}
.bet:hover{background:var(--card2)}
.bet.won{border-left:3px solid var(--gn)}.bet.lost{border-left:3px solid var(--rd)}.bet.pending{border-left:3px solid var(--gl)}.bet.void{border-left:3px solid var(--t3)}
.bet-main{display:flex;align-items:center;gap:12px}
.bet-info{flex:1;min-width:0}
.bet-top{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bet-top .sub{color:var(--t2);font-weight:400}
.tier{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace}
.tier.A{color:var(--gn);background:var(--gn-bg);border:1px solid var(--gn-bd)}
.tier.B{color:var(--pr2);background:var(--pr-bg);border:1px solid var(--pr-bd)}
.tier.C{color:var(--gl);background:var(--gl-bg);border:1px solid var(--gl-bd)}
.bet-meta{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-top:4px}
.eh{color:var(--gn2)}.em{color:var(--gl2)}.el{color:var(--t2)}
.actual{color:var(--pr3);font-weight:600}
.badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.badge.won{background:var(--gn-bg);color:var(--gn);border:1px solid var(--gn-bd)}
.badge.lost{background:var(--rd-bg);color:var(--rd);border:1px solid var(--rd-bd)}
.badge.pending{background:var(--gl-bg);color:var(--gl);border:1px solid var(--gl-bd)}
.badge.void{background:rgba(86,91,126,.12);color:var(--t2);border:1px solid var(--bd2)}
.chev{color:var(--t3);font-size:11px;transition:transform .2s;flex-shrink:0}
.bet.exp .chev{transform:rotate(90deg);color:var(--pr2)}
.detail{max-height:0;overflow:hidden;transition:max-height .28s ease;opacity:0}
.bet.exp .detail{max-height:340px;opacity:1;margin-top:12px;transition:max-height .3s ease,opacity .25s ease .05s}
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding-top:12px;border-top:1px dashed var(--bd2)}
.dcell{background:var(--inset);border-radius:9px;padding:9px 11px}
.dcell .dl{font-size:8.5px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.dcell .dv{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace}
.probbar{grid-column:1/-1;display:flex;align-items:center;gap:10px;background:var(--inset);border-radius:9px;padding:10px 12px}
.probbar .pb-track{flex:1;height:8px;background:var(--bg2);border-radius:5px;overflow:hidden;position:relative}
.probbar .pb-real{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--pr),var(--pr2));border-radius:5px}
.probbar .pb-imp{position:absolute;top:-3px;width:2px;height:14px;background:var(--gl2)}
.probbar .pb-lab{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t2);white-space:nowrap}

.empty{text-align:center;padding:60px 20px;color:var(--t2);background:var(--card);border:1px dashed var(--bd);border-radius:14px}
.footer{text-align:center;padding:30px 20px 10px;color:var(--t3);font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .35s ease both}

@media(max-width:1000px){.stats{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
@media(max-width:620px){.stats{grid-template-columns:repeat(2,1fr)}.wrap{padding:16px 13px 70px}.hdr{flex-direction:column;gap:12px;align-items:flex-start}.dgrid{grid-template-columns:repeat(2,1fr)}.row .nm{width:74px;font-size:11px}.bst{width:92px;font-size:10px}.ctl-lab{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo">A</div>
      <div><h1>Andross Picks</h1><div class="sub" id="sub">Loading…</div></div>
    </div>
    <div class="chip"><span class="dot"></span><span>ANDROSS</span></div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="g2">
    <div class="panel"><div class="pt"><span class="ico">📈</span>Profit / Loss <span class="r" id="plR"></span></div><div class="chart" id="plC"><div class="tip" id="plT"></div></div></div>
    <div class="panel"><div class="pt"><span class="ico">💰</span>Bankroll <span class="r" id="brR"></span></div><div class="chart" id="brC"><div class="tip" id="brT"></div></div></div>
  </div>
  <div class="g2">
    <div class="panel"><div class="pt"><span class="ico">🎯</span>Win Rate by Market</div><div id="mkt"></div></div>
    <div class="panel"><div class="pt"><span class="ico">⚡</span>Edge Analysis</div><div id="edge"></div></div>
  </div>
  <div class="g2">
    <div class="panel"><div class="pt"><span class="ico">🔥</span>Recent Form <span class="r" id="streakL"></span></div><div class="sdots" id="streak"></div></div>
    <div class="panel"><div class="pt"><span class="ico">📅</span>Daily P/L</div><div class="chart" style="height:170px" id="dayC"><div class="tip" id="dayT"></div></div></div>
  </div>

  <div class="controls">
    <div class="ctl-top">
      <div class="search"><span class="si">🔍</span><input id="q" placeholder="Search player…" autocomplete="off"></div>
      <div class="seg" id="periodSeg"></div>
    </div>
    <div class="ctl-row"><span class="ctl-lab">Status</span><div class="seg" id="statusSeg"></div></div>
    <div class="ctl-row"><span class="ctl-lab">Sport</span><div id="sportTog"></div></div>
    <div class="ctl-row"><span class="ctl-lab">Prop</span><div id="propTog"></div></div>
    <div class="ctl-row"><span class="ctl-lab">Tier</span><div id="tierTog"></div></div>
  </div>

  <div id="bets"><div class="empty">Loading bets…</div></div>
  <div class="footer">ANDROSS PICKS v2.12 — andross08</div>
</div>

<script>
const STAKE=5, START_BANK=20;
let BETS=[];
const F={status:'all', period:'all', sports:new Set(), props:new Set(), tiers:new Set(), q:''};
const EXPANDED=new Set();
const PROP_LABEL={'PTS+REB+AST':'PRA'};

/* ---------- helpers ---------- */
function calcPL(b){const o=parseInt(b.odds_american);if(b.status==='won')return o>0?STAKE*(o/100):STAKE*(100/Math.abs(o));if(b.status==='lost')return -STAKE;return 0;}
function getSport(b){const s=(b.sport||'').toLowerCase();if(s.includes('wnba'))return'wnba';if(s.includes('mlb')||s.includes('baseball'))return'mlb';if(s.includes('nba')||s.includes('basketball'))return'nba';
  return['Strikeouts','Hits','Total Bases','Home Runs','RBIs','Runs','Stolen Bases'].includes(b.prop_type)?'mlb':'nba';}
function sportLabel(s){return{nba:'🏀 NBA',mlb:'⚾ MLB',wnba:'🏀 WNBA'}[s]||s;}
function tierOf(b){return b.tier||null;}
function parseDate(b){const d=b.graded_at||b.recorded_at||'';return d?new Date(d):null;}
function daysAgo(n){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-n);return d;}
function inPeriod(b,p){if(p==='all')return true;let c;if(p==='today'){c=new Date();c.setHours(0,0,0,0);}else c=daysAgo(p==='3d'?3:p==='7d'?7:14);const d=parseDate(b);return d&&d>=c;}

/* analytic filters = everything EXCEPT status (drives stats + charts + list scope) */
function analyticMatch(b){
  if(!inPeriod(b,F.period))return false;
  if(F.sports.size&&!F.sports.has(getSport(b)))return false;
  if(F.props.size&&!F.props.has(b.prop_type))return false;
  if(F.tiers.size&&!F.tiers.has(tierOf(b)))return false;
  if(F.q&&!(b.player_name||'').toLowerCase().includes(F.q))return false;
  return true;
}
function statusMatch(b){return F.status==='all'?true:b.status===F.status;}

function resolvedSorted(list){return list.filter(b=>b.status==='won'||b.status==='lost').sort((a,b)=>{const x=parseDate(a),y=parseDate(b);return(!x||!y)?0:x-y;});}
function ns(t){return document.createElementNS('http://www.w3.org/2000/svg',t);}
function mkSVG(el,w,h,tipSel){const s=ns('svg');s.setAttribute('viewBox','0 0 '+w+' '+h);el.querySelectorAll('svg').forEach(x=>x.remove());el.insertBefore(s,el.querySelector('.tip'));return s;}
function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}

/* ---------- stat dashboard ---------- */
function renderStats(aset){
  const res=aset.filter(b=>b.status==='won'||b.status==='lost');
  const w=res.filter(b=>b.status==='won').length, l=res.length-w;
  const pend=aset.filter(b=>b.status==='pending').length;
  const wr=res.length?w/res.length*100:0;
  const pl=res.reduce((s,b)=>s+calcPL(b),0);
  const roi=res.length?pl/(res.length*STAKE)*100:0;
  // best market
  const m={};res.forEach(b=>{(m[b.prop_type]=m[b.prop_type]||{w:0,n:0}),b.status==='won'&&m[b.prop_type].w++,m[b.prop_type].n++;});
  let bestP='—',bestV=0;for(const[p,s]of Object.entries(m)){if(s.n>=3){const r=s.w/s.n*100;if(r>bestV){bestV=r;bestP=PROP_LABEL[p]||p;}}}
  // streak
  const rs=resolvedSorted(aset);let stk=0,st='';for(let i=rs.length-1;i>=0;i--){if(st===''||rs[i].status===st){st=rs[i].status;stk++;}else break;}
  const wC=wr>=55?'gn':wr>=50?'gl':'rd', pC=pl>=0?'gn':'rd';
  const stkTxt=st==='won'?stk+'W 🔥':st==='lost'?stk+'L':'—';
  document.getElementById('stats').innerHTML=
    card('pr','Record',w+'W-'+l+'L',pend+' pending')+
    card(wC,'Win Rate','<span style="color:var(--'+wC+')">'+wr.toFixed(1)+'%</span>',res.length+' resolved')+
    card(pC,'Profit / Loss','<span style="color:var(--'+pC+')">'+(pl>=0?'+':'')+'$'+pl.toFixed(2)+'</span>','$'+STAKE+' flat')+
    card(pC,'ROI','<span style="color:var(--'+pC+')">'+(roi>=0?'+':'')+roi.toFixed(1)+'%</span>','on '+(res.length*STAKE)+'u')+
    card('pr','Best Market','<span style="color:var(--pr2);font-size:19px">'+bestP+'</span>',bestV?bestV.toFixed(0)+'% WR':'—')+
    card(st==='won'?'gn':st==='lost'?'rd':'pr','Streak','<span style="color:var(--'+(st==='won'?'gn':st==='lost'?'rd':'pr2')+')">'+stkTxt+'</span>','current');
}
function card(c,l,v,s){return'<div class="sc '+c+' fade"><div class="l">'+l+'</div><div class="v">'+v+'</div><div class="s">'+s+'</div></div>';}

/* ---------- charts (analytic-scoped, resolved only) ---------- */
function drawPL(aset){
  const el=document.getElementById('plC'),tip=document.getElementById('plT'),res=resolvedSorted(aset);
  document.getElementById('plR').textContent=res.length+' bets';
  el.querySelectorAll('svg').forEach(x=>x.remove());
  if(!res.length){return;}
  const W=620,H=210,P={t:24,r:24,b:30,l:52},svg=mkSVG(el,W,H);
  let cum=0;const pts=res.map((b,i)=>{cum+=calcPL(b);return{y:cum,b};});
  const minY=Math.min(0,...pts.map(p=>p.y))-4,maxY=Math.max(0,...pts.map(p=>p.y))+4,rY=maxY-minY||1;
  const sx=i=>(i/(pts.length-1||1))*(W-P.l-P.r)+P.l,sy=v=>H-P.b-((v-minY)/rY)*(H-P.t-P.b);
  for(let i=0;i<=5;i++){const v=minY+rY/5*i,y=sy(v);gline(svg,P.l,W-P.r,y,y);glab(svg,P.l-8,y+3,'$'+v.toFixed(0),'end');}
  if(minY<0&&maxY>0){const z=ns('line');z.setAttribute('x1',P.l);z.setAttribute('x2',W-P.r);z.setAttribute('y1',sy(0));z.setAttribute('y2',sy(0));z.setAttribute('stroke',cssv('--t3'));z.setAttribute('stroke-dasharray','4,3');svg.appendChild(z);}
  const col=cum>=0?cssv('--gn'):cssv('--rd');
  grad(svg,'plg',col);
  let a='M'+sx(0)+','+sy(0);pts.forEach((p,i)=>a+=' L'+sx(i)+','+sy(p.y));a+=' L'+sx(pts.length-1)+','+sy(0)+' Z';path(svg,a,'url(#plg)','none');
  let d='';pts.forEach((p,i)=>d+=(i?'L':'M')+sx(i)+','+sy(p.y));path(svg,d,'none',col,2.5);
  dot(svg,sx(pts.length-1),sy(cum),5,col);
  glab(svg,sx(pts.length-1),sy(cum)-13,(cum>=0?'+':'')+'$'+cum.toFixed(2),'middle',cum>=0?cssv('--gn2'):cssv('--rd2'),12,700);
  hover(svg,el,tip,pts,sx,sy,W,H,P,p=>{const c=p.y>=0?cssv('--gn2'):cssv('--rd2');return'<div class="v" style="color:'+c+'">'+(p.y>=0?'+':'')+'$'+p.y.toFixed(2)+'</div><div class="l">'+p.b.player_name+' · '+(PROP_LABEL[p.b.prop_type]||p.b.prop_type)+'</div>';});
}
function drawBR(aset){
  const el=document.getElementById('brC'),tip=document.getElementById('brT'),res=resolvedSorted(aset);
  el.querySelectorAll('svg').forEach(x=>x.remove());if(!res.length)return;
  const W=620,H=210,P={t:24,r:24,b:26,l:52},svg=mkSVG(el,W,H);
  let bank=START_BANK;const pts=[{y:bank,b:null}];res.forEach(b=>{bank+=calcPL(b);pts.push({y:bank,b});});
  document.getElementById('brR').textContent='$'+bank.toFixed(0);
  const minY=Math.min(...pts.map(p=>p.y))-4,maxY=Math.max(...pts.map(p=>p.y))+8,rY=maxY-minY||1;
  const sx=i=>(i/(pts.length-1||1))*(W-P.l-P.r)+P.l,sy=v=>H-P.b-((v-minY)/rY)*(H-P.t-P.b);
  for(let i=0;i<=4;i++){const v=minY+rY/4*i,y=sy(v);gline(svg,P.l,W-P.r,y,y);glab(svg,P.l-8,y+3,'$'+v.toFixed(0),'end');}
  grad(svg,'brg',cssv('--pr'));
  let a='M'+sx(0)+','+sy(minY);pts.forEach((p,i)=>a+=' L'+sx(i)+','+sy(p.y));a+=' L'+sx(pts.length-1)+','+sy(minY)+' Z';path(svg,a,'url(#brg)','none');
  let d='';pts.forEach((p,i)=>d+=(i?'L':'M')+sx(i)+','+sy(p.y));path(svg,d,'none',cssv('--pr2'),2.5);
  dot(svg,sx(pts.length-1),sy(bank),5,cssv('--pr2'));
  glab(svg,sx(pts.length-1),sy(bank)-13,'$'+bank.toFixed(0),'middle',cssv('--pr3'),12,700);
  glab(svg,sx(0)+6,sy(pts[0].y)-8,'$'+START_BANK,'start',cssv('--t3'),9);
  hover(svg,el,tip,pts,sx,sy,W,H,P,p=>'<div class="v" style="color:var(--pr3)">$'+p.y.toFixed(2)+'</div><div class="l">'+(p.b?p.b.player_name:'Starting bankroll')+'</div>');
}
function drawDaily(aset){
  const el=document.getElementById('dayC'),tip=document.getElementById('dayT'),res=resolvedSorted(aset);
  el.querySelectorAll('svg').forEach(x=>x.remove());if(!res.length)return;
  const days={};res.forEach(b=>{const d=parseDate(b);if(!d)return;const k=d.toISOString().slice(0,10);(days[k]=days[k]||{pl:0,w:0,l:0,date:k});if(b.status==='won'){days[k].pl+=calcPL(b);days[k].w++;}else{days[k].pl-=STAKE;days[k].l++;}});
  const sorted=Object.values(days).sort((a,b)=>a.date.localeCompare(b.date));if(!sorted.length)return;
  const W=1180,H=150,P={t:16,r:18,b:28,l:46},svg=mkSVG(el,W,H);
  const maxAbs=Math.max(5,...sorted.map(d=>Math.abs(d.pl))),gap=(W-P.l-P.r)/sorted.length,barW=Math.min(38,gap-5),mid=H/2,sc=(H/2-P.t-6)/maxAbs;
  gline(svg,P.l,W-P.r,mid,mid);
  sorted.forEach((d,i)=>{const x=P.l+gap*i+gap/2-barW/2,h=Math.abs(d.pl)*sc,y=d.pl>=0?mid-h:mid,c=d.pl>=0?cssv('--gn'):cssv('--rd'),f=d.pl>=0?'rgba(34,197,94,.22)':'rgba(239,68,68,.22)';
    const r=ns('rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',barW);r.setAttribute('height',Math.max(h,2));r.setAttribute('rx',4);r.setAttribute('fill',f);r.setAttribute('stroke',c);r.style.cursor='pointer';
    r.addEventListener('mouseenter',()=>{tip.style.opacity='1';tip.innerHTML='<div class="v" style="color:'+c+'">'+(d.pl>=0?'+':'')+'$'+d.pl.toFixed(2)+'</div><div class="l">'+d.date+' · '+d.w+'W-'+d.l+'L</div>';});
    r.addEventListener('mousemove',e=>{const b=el.getBoundingClientRect();tip.style.left=(e.clientX-b.left+12)+'px';tip.style.top=(e.clientY-b.top-10)+'px';});
    r.addEventListener('mouseleave',()=>tip.style.opacity='0');svg.appendChild(r);
    if(i%Math.ceil(sorted.length/14||1)===0)glab(svg,x+barW/2,H-6,d.date.slice(5),'middle',cssv('--t3'),8);});
}
function renderMkt(aset){
  const res=aset.filter(b=>b.status==='won'||b.status==='lost'),m={};
  res.forEach(b=>{(m[b.prop_type]=m[b.prop_type]||{w:0,l:0,pl:0}),b.status==='won'?(m[b.prop_type].w++,m[b.prop_type].pl+=calcPL(b)):(m[b.prop_type].l++,m[b.prop_type].pl-=STAKE);});
  const rows=Object.entries(m).filter(([n,s])=>s.w+s.l>=3).sort((a,b)=>b[1].w/(b[1].w+b[1].l)-a[1].w/(a[1].w+a[1].l));
  document.getElementById('mkt').innerHTML=rows.length?rows.map(([n,s])=>{const wr=s.w/(s.w+s.l)*100,c=wr>=60?cssv('--gn'):wr>=50?cssv('--gl'):cssv('--rd'),pc=s.pl>=0?cssv('--gn'):cssv('--rd');
    return'<div class="row"><div class="nm">'+(PROP_LABEL[n]||n)+'</div><div class="bw"><div class="bar" style="width:'+wr+'%;background:'+c+'1f;border-right:2px solid '+c+'"><span style="color:'+c+'">'+wr.toFixed(0)+'%</span></div></div><div class="bst">'+s.w+'-'+s.l+' <b style="color:'+pc+'">'+(s.pl>=0?'+':'')+'$'+s.pl.toFixed(0)+'</b></div></div>';}).join(''):'<div style="color:var(--t2);font-size:12px;padding:20px;text-align:center">Not enough data</div>';
}
function renderEdge(aset){
  const res=aset.filter(b=>b.status==='won'||b.status==='lost'),el=document.getElementById('edge');let h='';
  [['5-10%',.05,.10],['10-15%',.10,.15],['15-20%',.15,.20],['20-25%',.20,.25],['25%+',.25,1]].forEach(([lab,mn,mx])=>{
    const inR=res.filter(b=>b.edge>=mn&&b.edge<mx),w=inR.filter(b=>b.status==='won').length,l=inR.length-w;if(!inR.length)return;
    const wr=w/(w+l)*100,c=wr>=60?cssv('--gn'):wr>=50?cssv('--gl'):cssv('--rd');
    h+='<div class="row"><div class="nm" style="width:78px;font-size:11px">'+lab+'</div><div class="bw" style="height:24px"><div class="bar" style="width:'+wr+'%;background:'+c+'1f;border-right:2px solid '+c+';height:100%"><span style="color:'+c+';font-size:9px">'+wr.toFixed(0)+'%</span></div></div><div class="bst" style="width:64px">'+w+'-'+l+'</div></div>';});
  el.innerHTML=h||'<div style="color:var(--t2);font-size:12px;padding:20px;text-align:center">Not enough data</div>';
}
function renderStreak(aset){
  const rs=resolvedSorted(aset).slice(-44);
  document.getElementById('streak').innerHTML=rs.map(b=>'<div class="sd '+(b.status==='won'?'w':'l')+'" title="'+b.player_name+' '+(PROP_LABEL[b.prop_type]||b.prop_type)+'">'+(b.status==='won'?'W':'L')+'</div>').join('')||'<span style="color:var(--t2);font-size:12px">No resolved bets</span>';
  const all=resolvedSorted(aset);let stk=0,st='';for(let i=all.length-1;i>=0;i--){if(st===''||all[i].status===st){st=all[i].status;stk++;}else break;}
  document.getElementById('streakL').innerHTML=st==='won'?'<span style="color:var(--gn)">🔥 '+stk+'W</span>':st==='lost'?'<span style="color:var(--rd)">'+stk+'L</span>':'';
}

/* svg utils */
function gline(s,x1,x2,y1,y2){const l=ns('line');l.setAttribute('x1',x1);l.setAttribute('x2',x2);l.setAttribute('y1',y1);l.setAttribute('y2',y2);l.setAttribute('stroke',cssv('--bd'));l.setAttribute('stroke-width','.5');s.appendChild(l);}
function glab(s,x,y,t,anch,fill,size,wt){const e=ns('text');e.setAttribute('x',x);e.setAttribute('y',y);e.setAttribute('text-anchor',anch||'start');e.setAttribute('fill',fill||cssv('--t3'));e.setAttribute('font-size',size||9);if(wt)e.setAttribute('font-weight',wt);e.setAttribute('font-family','JetBrains Mono,monospace');e.textContent=t;s.appendChild(e);}
function path(s,d,fill,stroke,sw){const p=ns('path');p.setAttribute('d',d);p.setAttribute('fill',fill);p.setAttribute('stroke',stroke);if(sw){p.setAttribute('stroke-width',sw);p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');}s.appendChild(p);}
function dot(s,x,y,r,f){const c=ns('circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);c.setAttribute('fill',f);s.appendChild(c);}
function grad(s,id,col){const d=ns('defs'),g=ns('linearGradient');g.id=id;g.setAttribute('x1','0');g.setAttribute('y1','0');g.setAttribute('x2','0');g.setAttribute('y2','1');const a=ns('stop');a.setAttribute('offset','0%');a.setAttribute('stop-color',col);a.setAttribute('stop-opacity','.18');const b=ns('stop');b.setAttribute('offset','100%');b.setAttribute('stop-color',col);b.setAttribute('stop-opacity','0');g.appendChild(a);g.appendChild(b);d.appendChild(g);s.appendChild(d);}
function hover(svg,el,tip,pts,sx,sy,W,H,P,fn){
  const hl=ns('line');hl.setAttribute('y1',P.t);hl.setAttribute('y2',H-P.b);hl.setAttribute('stroke',cssv('--pr2'));hl.setAttribute('stroke-dasharray','3,3');hl.style.opacity='0';svg.appendChild(hl);
  const hd=ns('circle');hd.setAttribute('r','4');hd.setAttribute('fill',cssv('--pr2'));hd.style.opacity='0';svg.appendChild(hd);
  const hw=(W-P.l-P.r)/(pts.length||1);
  pts.forEach((p,i)=>{const r=ns('rect');r.setAttribute('x',sx(i)-hw/2);r.setAttribute('y',P.t);r.setAttribute('width',hw);r.setAttribute('height',H-P.t-P.b);r.setAttribute('fill','transparent');r.style.cursor='crosshair';
    r.addEventListener('mouseenter',()=>{tip.style.opacity='1';tip.innerHTML=fn(p,i);hl.setAttribute('x1',sx(i));hl.setAttribute('x2',sx(i));hl.style.opacity='.5';hd.setAttribute('cx',sx(i));hd.setAttribute('cy',sy(p.y));hd.style.opacity='1';});
    r.addEventListener('mousemove',e=>{const b=el.getBoundingClientRect();tip.style.left=(e.clientX-b.left+12)+'px';tip.style.top=(e.clientY-b.top-10)+'px';});
    r.addEventListener('mouseleave',()=>{tip.style.opacity='0';hl.style.opacity='0';hd.style.opacity='0';});svg.appendChild(r);});
}

/* ---------- controls ---------- */
function renderControls(){
  document.getElementById('periodSeg').innerHTML=[['all','ALL'],['today','TODAY'],['3d','3D'],['7d','7D'],['14d','14D']].map(([k,l])=>'<b class="'+(F.period===k?'on':'')+'" data-period="'+k+'">'+l+'</b>').join('');
  document.getElementById('statusSeg').innerHTML=[['all','All'],['pending','Pending'],['won','Won'],['lost','Lost']].map(([k,l])=>'<b class="'+(F.status===k?'on':'')+'" data-status="'+k+'">'+l+'</b>').join('');
  const sports=[...new Set(BETS.map(getSport))];
  document.getElementById('sportTog').innerHTML=sports.map(s=>'<button class="tog '+(F.sports.has(s)?'on':'')+'" data-sport="'+s+'">'+sportLabel(s)+'</button>').join('');
  const props=[...new Set(BETS.map(b=>b.prop_type))];
  document.getElementById('propTog').innerHTML=props.map(p=>'<button class="tog '+(F.props.has(p)?'on':'')+'" data-prop="'+p+'">'+(PROP_LABEL[p]||p)+'</button>').join('');
  const tiers=['A','B','C'];
  document.getElementById('tierTog').innerHTML=tiers.map(t=>'<button class="tog '+(F.tiers.has(t)?'on':'')+'" data-tier="'+t+'">Tier '+t+'</button>').join('');
}

/* ---------- bets list ---------- */
function fmtPct(x){return x==null?'—':(x*100).toFixed(1)+'%';}
function betId(b){return b._id;}
function renderBets(){
  const list=BETS.filter(b=>analyticMatch(b)&&statusMatch(b));
  const cont=document.getElementById('bets');
  if(!list.length){cont.innerHTML='<div class="empty">No bets match the current filters.</div>';return;}
  // group by event + date-string
  const groups={};
  list.forEach(b=>{const dm=(b.commence_time||'').match(/^(\w+ \d+)/);const ds=dm?dm[1]:'—';const k=(b.event||'?')+'|'+ds;
    (groups[k]=groups[k]||{event:b.event||'?',date:ds,sport:getSport(b),bets:[],ts:0,pend:false});
    groups[k].bets.push(b);const d=parseDate(b);if(d&&+d>groups[k].ts)groups[k].ts=+d;if(b.status==='pending')groups[k].pend=true;});
  // pending groups first, then most-recent date first
  const gl=Object.values(groups).sort((a,b)=>{if(a.pend!==b.pend)return a.pend?-1:1;return b.ts-a.ts;});
  let h='';
  gl.forEach((g,gi)=>{
    const gw=g.bets.filter(b=>b.status==='won').length,glo=g.bets.filter(b=>b.status==='lost').length,gr=gw+glo;
    const em=g.sport==='mlb'?'⚾':'🏀',bc=g.sport==='mlb'?'var(--gl)':'var(--pr)';
    const rec=gr?'<span class="rec" style="color:'+(gw>glo?'var(--gn)':gw===glo?'var(--gl)':'var(--rd)')+'">'+gw+'W-'+glo+'L</span>':(g.pend?'<span class="rec" style="color:var(--gl)">'+g.bets.length+' pending</span>':'');
    h+='<div class="group" style="animation-delay:'+Math.min(gi*.03,.4)+'s"><div class="gh" style="border-left:3px solid '+bc+'"><div><div class="t">'+em+' '+g.event+'</div><div class="d">'+g.date+'</div></div>'+rec+'</div>';
    // pending first within group, then by edge
    g.bets.sort((a,b)=>{if((a.status==='pending')!==(b.status==='pending'))return a.status==='pending'?-1:1;return (b.edge||0)-(a.edge||0);}).forEach(b=>{
      const sc=b.status||'pending',ep=((b.edge||0)*100).toFixed(1),ec=b.edge>=.20?'eh':b.edge>=.12?'em':'el';
      const tier=b.tier?'<span class="tier '+b.tier+'">'+b.tier+'</span>':'';
      const act=(b.actual_stat!==undefined&&b.actual_stat!==null)?' · Result <span class="actual">'+b.actual_stat+'</span>':'';
      const exp=EXPANDED.has(b._id)?' exp':'';
      h+='<div class="bet '+sc+exp+'" data-bet="'+b._id+'"><div class="bet-main"><div class="bet-info"><div class="bet-top">'+tier+b.player_name+' <span class="sub">— '+(PROP_LABEL[b.prop_type]||b.prop_type)+' O '+b.line+'</span></div>'+
        '<div class="bet-meta">'+b.odds_american+' · Edge <span class="'+ec+'">'+ep+'%</span> · Avg '+(b.season_avg!=null?b.season_avg:'—')+act+'</div></div>'+
        '<span class="badge '+sc+'">'+sc.toUpperCase()+'</span><span class="chev">▶</span></div>'+detailHTML(b)+'</div>';
    });
    h+='</div>';
  });
  cont.innerHTML=h;
}
function detailHTML(b){
  const real=b.real_prob,imp=b.implied_prob;
  let probbar='';
  if(real!=null&&imp!=null){const rp=Math.min(100,real*100),ip=Math.min(100,imp*100);
    probbar='<div class="probbar"><span class="pb-lab">Model '+fmtPct(real)+'</span><div class="pb-track"><div class="pb-real" style="width:'+rp+'%"></div><div class="pb-imp" style="left:'+ip+'%" title="implied"></div></div><span class="pb-lab" style="color:var(--gl2)">Implied '+fmtPct(imp)+'</span></div>';}
  const cells=[
    ['Season HR',b.season_hit_rate||'—'],
    ['Recent HR',b.recent_hit_rate||'—'],
    ['Consistency',b.consistency||'—'],
    ['Recent Avg',b.recent_avg!=null?b.recent_avg:'—'],
    ['Kelly Bet',b.kelly_bet!=null?'$'+(+b.kelly_bet).toFixed(2):'—'],
    ['To Win',b.potential_win!=null?'$'+(+b.potential_win).toFixed(2):'—'],
    ['Model Prob',fmtPct(b.real_prob)],
    ['Implied',fmtPct(b.implied_prob)],
  ];
  return'<div class="detail"><div class="dgrid">'+probbar+cells.map(([l,v])=>'<div class="dcell"><div class="dl">'+l+'</div><div class="dv">'+v+'</div></div>').join('')+'</div></div>';
}

/* ---------- orchestration ---------- */
function render(){
  const aset=BETS.filter(analyticMatch);
  renderStats(aset);
  drawPL(aset);drawBR(aset);drawDaily(aset);
  renderMkt(aset);renderEdge(aset);renderStreak(aset);
  renderControls();renderBets();
}
function rerenderAnalytics(){render();}

/* events (delegation) */
document.addEventListener('click',e=>{
  const ps=e.target.closest('[data-period]');if(ps){F.period=ps.dataset.period;render();return;}
  const ss=e.target.closest('[data-status]');if(ss){F.status=ss.dataset.status;renderControls();renderBets();return;}
  const sp=e.target.closest('[data-sport]');if(sp){toggle(F.sports,sp.dataset.sport);render();return;}
  const pp=e.target.closest('[data-prop]');if(pp){toggle(F.props,pp.dataset.prop);render();return;}
  const tt=e.target.closest('[data-tier]');if(tt){toggle(F.tiers,tt.dataset.tier);render();return;}
  const bet=e.target.closest('[data-bet]');if(bet){const id=+bet.dataset.bet;EXPANDED.has(id)?EXPANDED.delete(id):EXPANDED.add(id);bet.classList.toggle('exp');return;}
});
function toggle(set,v){set.has(v)?set.delete(v):set.add(v);}
let qTimer;
document.getElementById('q').addEventListener('input',e=>{clearTimeout(qTimer);qTimer=setTimeout(()=>{F.q=e.target.value.trim().toLowerCase();render();},180);});

/* load */
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());BETS=await r.json();
    BETS.forEach((b,i)=>b._id=i);
    document.getElementById('sub').textContent='v2.12 · '+BETS.length+' bets tracked · '+new Date().toLocaleDateString();
    render();
  }catch(e){document.getElementById('sub').textContent='❌ Cannot load data.json';document.getElementById('bets').innerHTML='<div class="empty">Failed to load data.json</div>';}
}
loadData();
</script>
