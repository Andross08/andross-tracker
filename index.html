<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andross Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--s1:#12151c;--s2:#1a1e28;--bd:#252a36;--tx:#e2e8f0;--t2:#8892a4;--gn:#22c55e;--gn-bg:#0a2a1a;--rd:#ef4444;--rd-bg:#2a0a0a;--gl:#f59e0b;--gl-bg:#2a1f0a;--bl:#3b82f6;--ac:#6366f1;--ac2:#818cf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.c{max-width:1100px;margin:0 auto;padding:20px 16px}
.hdr{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:28px;font-weight:800;letter-spacing:-1.5px;background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sub{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.g::before{background:var(--gn)}.sc.r::before{background:var(--rd)}.sc.gl::before{background:var(--gl)}.sc.b::before{background:var(--bl)}.sc.a::before{background:var(--ac)}
.sc-l{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1.2px;font-family:'JetBrains Mono',monospace;margin-bottom:3px}
.sc-v{font-size:22px;font-weight:800;letter-spacing:-1px}
.sc-s{font-size:11px;color:var(--t2);margin-top:2px}
.props{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.prop-tag{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;font-size:11px;font-family:'JetBrains Mono',monospace}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{background:var(--s1);border:1px solid var(--bd);color:var(--t2);padding:5px 14px;border-radius:20px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--ac);color:var(--tx)}
.fbtn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.group{margin-bottom:16px}
.gh{background:var(--s2);padding:8px 14px;border-radius:8px 8px 0 0;display:flex;justify-content:space-between;align-items:center}
.gh-t{font-size:13px;font-weight:700}
.gh-d{font-size:11px;color:var(--t2)}
.bet{background:var(--s1);padding:8px 14px;border-bottom:1px solid rgba(37,42,54,.6);display:flex;align-items:center;gap:10px}
.bet:last-child{border-radius:0 0 8px 8px}
.bet.won{background:var(--gn-bg)}.bet.lost{background:var(--rd-bg)}
.bet-info{flex:1;min-width:0}
.bet-top{font-size:13px;font-weight:600}
.bet-top span{color:var(--t2);font-weight:400}
.bet-tier{font-size:9px;font-weight:700;margin-right:4px;padding:1px 4px;border-radius:3px}
.tier-a{color:var(--gn);background:rgba(34,197,94,.1)}
.tier-b{color:var(--t2);background:rgba(136,146,164,.1)}
.bet-meta{font-size:11px;color:var(--t2);font-family:'JetBrains Mono',monospace;margin-top:2px}
.edge-h{color:var(--gn)}.edge-m{color:var(--gl)}.edge-l{color:var(--t2)}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.badge-won{background:var(--gn-bg);color:var(--gn);border:1px solid rgba(34,197,94,.2)}
.badge-lost{background:var(--rd-bg);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.badge-pending{background:var(--gl-bg);color:var(--gl);border:1px solid rgba(245,158,11,.2)}
.actual{color:var(--ac2);font-weight:600}
.empty{text-align:center;padding:60px;color:var(--t2)}
.refresh{position:fixed;bottom:20px;right:20px;background:var(--ac);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.3);transition:transform .15s}
.refresh:hover{transform:translateY(-2px)}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.c{padding:12px 10px}}
</style>
</head>
<body>
<div class="c">
  <div class="hdr">
    <h1>🎯 ANDROSS TRACKER</h1>
    <div class="hdr-sub" id="subtitle">Loading...</div>
  </div>
  <div class="stats" id="statsGrid"></div>
  <div class="props" id="propsGrid"></div>
  <div class="filters" id="filters"></div>
  <div id="betsContainer"></div>
</div>
<button class="refresh" onclick="location.reload()">↻ Refresh</button>

<script>
const bets = __BETS_PLACEHOLDER__;
let filter = 'all';

function calcPL(b) {
  const odds = parseInt(b.odds_american);
  if (b.status === 'won') return odds > 0 ? 5 * (odds / 100) : 5 * (100 / Math.abs(odds));
  if (b.status === 'lost') return -5;
  return 0;
}

function getSport(b) {
  const prop = (b.prop_type || '');
  if (['Strikeouts','Hits','Total Bases','Home Runs','RBIs','Runs','Stolen Bases'].includes(prop)) return 'mlb';
  return 'nba';
}

function render() {
  const res = bets.filter(b => b.status === 'won' || b.status === 'lost');
  const won = res.filter(b => b.status === 'won');
  const lost = res.filter(b => b.status === 'lost');
  const pend = bets.filter(b => b.status === 'pending');
  const wr = res.length > 0 ? (won.length / res.length * 100) : 0;
  const pl = res.reduce((s, b) => s + calcPL(b), 0);
  const roi = res.length > 0 ? (pl / (res.length * 5) * 100) : 0;

  const mlbR = res.filter(b => getSport(b) === 'mlb');
  const mlbW = mlbR.filter(b => b.status === 'won');
  const mlbPL = mlbR.reduce((s, b) => s + calcPL(b), 0);

  document.getElementById('subtitle').textContent = `v2.4 + Tier System • ${bets.length} bets • Reload to refresh`;

  document.getElementById('statsGrid').innerHTML = `
    <div class="sc a"><div class="sc-l">Record</div><div class="sc-v">${won.length}W-${lost.length}L</div><div class="sc-s">${pend.length} pending</div></div>
    <div class="sc ${wr>=55?'g':wr>=50?'gl':'r'}"><div class="sc-l">Win Rate</div><div class="sc-v" style="color:${wr>=55?'var(--gn)':wr>=50?'var(--gl)':'var(--rd)'}">${wr.toFixed(1)}%</div><div class="sc-s">${res.length} resolved</div></div>
    <div class="sc ${pl>=0?'g':'r'}"><div class="sc-l">P/L ($5 flat)</div><div class="sc-v" style="color:${pl>=0?'var(--gn)':'var(--rd)'}">${pl>=0?'+':''}$${pl.toFixed(2)}</div><div class="sc-s">ROI: ${roi>=0?'+':''}${roi.toFixed(1)}%</div></div>
    <div class="sc gl"><div class="sc-l">MLB K's</div><div class="sc-v" style="color:var(--gl)">${mlbW.length}W-${mlbR.length-mlbW.length}L</div><div class="sc-s">P/L: ${mlbPL>=0?'+':''}$${mlbPL.toFixed(2)}</div></div>
  `;

  const ps = {};
  res.forEach(b => {
    const p = b.prop_type;
    if (!ps[p]) ps[p] = { w: 0, l: 0, pl: 0 };
    if (b.status === 'won') { ps[p].w++; ps[p].pl += calcPL(b); }
    else { ps[p].l++; ps[p].pl -= 5; }
  });
  document.getElementById('propsGrid').innerHTML = Object.entries(ps)
    .sort((a, b) => b[1].pl - a[1].pl)
    .map(([p, s]) => `<div class="prop-tag"><span style="color:var(--t2)">${p}</span> <span style="color:${s.pl>=0?'var(--gn)':'var(--rd)'};font-weight:600">${s.w}-${s.l} $${s.pl>=0?'+':''}${s.pl.toFixed(0)}</span></div>`)
    .join('');

  const filterDefs = [
    ['all','All',bets.length],['pending','⏳ Pending',pend.length],['won','✅ Won',won.length],
    ['lost','❌ Lost',lost.length],['tierA','🅰️ Tier A',bets.filter(b=>b.tier==='A').length],['nba','🏀 NBA',null],['mlb','⚾ MLB',null]
  ];
  document.getElementById('filters').innerHTML = filterDefs.map(([k,l,c]) =>
    `<button class="fbtn ${filter===k?'on':''}" onclick="setFilter('${k}')">${l}${c!==null?' ('+c+')':''}</button>`
  ).join('');

  let fb = [...bets];
  if (filter === 'pending') fb = fb.filter(b => b.status === 'pending');
  else if (filter === 'won') fb = fb.filter(b => b.status === 'won');
  else if (filter === 'lost') fb = fb.filter(b => b.status === 'lost');
  else if (filter === 'nba') fb = fb.filter(b => getSport(b) === 'nba');
  else if (filter === 'mlb') fb = fb.filter(b => getSport(b) === 'mlb');
  else if (filter === 'tierA') fb = fb.filter(b => b.tier === 'A');

  const groups = {};
  fb.forEach(b => {
    const ct = b.commence_time || '';
    const dateMatch = ct.match(/^(\w+ \d+)/);
    const dateStr = dateMatch ? dateMatch[1] : 'Unknown';
    const k = `${b.event}|${dateStr}`;
    if (!groups[k]) groups[k] = { event: b.event, date: dateStr, sport: getSport(b), bets: [] };
    groups[k].bets.push(b);
  });

  const gl = Object.values(groups).sort((a, b) => {
    const ap = a.bets.some(x => x.status === 'pending');
    const bp = b.bets.some(x => x.status === 'pending');
    if (ap && !bp) return -1;
    if (!ap && bp) return 1;
    return 0;
  });

  if (gl.length === 0) {
    document.getElementById('betsContainer').innerHTML = '<div class="empty"><h3>No bets match filter</h3></div>';
    return;
  }

  let html = '';
  for (const g of gl) {
    const gW = g.bets.filter(b => b.status === 'won').length;
    const gL = g.bets.filter(b => b.status === 'lost').length;
    const gR = gW + gL;
    const emoji = g.sport === 'mlb' ? '⚾' : '🏀';
    const borderColor = g.sport === 'mlb' ? 'var(--gl)' : 'var(--ac)';
    const record = gR > 0 ? `<span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:${gW>gL?'var(--gn)':gW===gL?'var(--gl)':'var(--rd)'}">${gW}W-${gL}L</span>` : '';

    html += `<div class="group"><div class="gh" style="border-left:3px solid ${borderColor}">
      <div><div class="gh-t">${emoji} ${g.event}</div><div class="gh-d">${g.date}</div></div>${record}</div>`;

    const sorted = g.bets.sort((a, b) => b.edge - a.edge);
    for (const bet of sorted) {
      const ep = (bet.edge * 100).toFixed(1);
      const ec = bet.edge >= 0.20 ? 'edge-h' : bet.edge >= 0.12 ? 'edge-m' : 'edge-l';
      const sc = bet.status || 'pending';
      const tierTag = bet.tier === 'A' ? '<span class="bet-tier tier-a">🅰️</span>' :
                       bet.tier === 'B' ? '<span class="bet-tier tier-b">🅱️</span>' : '';
      const statusBadge = `<span class="badge badge-${sc}">${sc.toUpperCase()}</span>`;
      const actualStat = bet.actual_stat !== undefined ? ` | Result: <span class="actual">${bet.actual_stat}</span>` : '';
      const avgRatio = bet.avg_ratio ? ` | ${bet.avg_ratio}x` : '';

      html += `<div class="bet ${sc}">
        <div class="bet-info">
          <div class="bet-top">${tierTag}${bet.player_name} <span>— ${bet.prop_type} O ${bet.line}</span></div>
          <div class="bet-meta">${bet.odds_american} | Edge: <span class="${ec}">${ep}%</span> | Avg: ${bet.season_avg}${avgRatio}${actualStat}</div>
        </div>
        ${statusBadge}
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('betsContainer').innerHTML = html;
}

function setFilter(f) {
  filter = f;
  render();
}

render();
</script>
</body>
</html>
